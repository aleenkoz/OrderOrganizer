<!DOCTYPE html>
<html>
<head>
    <title>Order Organizer</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: linear-gradient(135deg, #fce7f3, #e0f2fe);
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 850px;
            margin: 60px auto;
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.10);
            backdrop-filter: blur(8px);
        }
        h1 {
            text-align: center;
            color: #4b5563;
            margin-bottom: 10px;
            font-size: 38px;
            font-weight: 600;
        }
        h3 {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            font-weight: 400;
            font-size: 20px;
        }
        textarea {
            width: 100%;
            height: 160px;
            padding: 14px;
            border-radius: 14px;
            border: 2px solid #fbcfe8;
            font-size: 17px;
            background: #fff0f6;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 14px;
            border: 2px solid #c7d2fe;
            font-size: 17px;
            background: #eef2ff;
        }
        button {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background: #a5b4fc;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.25s;
        }
        button:hover {
            background: #818cf8;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Order Organizer</h1>
    <h3>Your smart logistics assistant</h3>

    <form method="POST">
        <label>Enter your job text:</label>
        <textarea name="raw_text" placeholder="Example: 3x pipes to site B asap; deliver gloves..."></textarea>

        <label>Preferred summary language:</label>
        <input type="text" name="language" placeholder="English">

        <button type="submit">Run Pipeline</button>
    </form>
</div>

</body>
</html>
